<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4단계: 최종 완성본 (새로운 클래스 및 상세 문구 피드백)</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #b45309; color: #ffffff;
            font-family: sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: background-color 0.5s ease;
        }
        .webcam-box {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10;
        }
        #webcam-container {
            width: 160px; height: 160px;
            border-radius: 12px; overflow: hidden;
            border: 2px solid #333; background-color: #000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        /* 실시간 상황 알림 문자 영역 스타일 */
        #webcam-status {
            font-size: 1.1rem; font-weight: bold;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 6px 14px; border-radius: 20px; text-align: center;
            letter-spacing: 0.5px; transition: color 0.3s ease;
        }
        
        .container { text-align: center; }
        #timer { font-size: 6rem; font-weight: bold; margin: 20px 0; }
        button {
            background-color: #ffffff; color: #121212; border: none;
            padding: 12px 36px; font-size: 1.1rem; font-weight: 600;
            border-radius: 30px; cursor: pointer;
        }
        .status-focus { background-color: #14532d !important; }
        .status-distracted { animation: blink-red 1s infinite !important; }
        @keyframes blink-red {
            0%, 100% { background-color: #121212; }
            50% { background-color: #7f1d1d; } 
        }
    </style>
</head>
<body>
    <div class="webcam-box">
        <div id="webcam-container"></div>
        <!-- 초기 텍스트 노란색 세팅 -->
        <div id="webcam-status" style="color: #f59e0b;">공부해보는건 어떨까요?</div>
    </div>

    <div class="container">
        <h1>AI STUDY TIMER</h1>
        <div id="timer">00:00:00</div>
        <button type="button" onclick="init()">Start</button>
        <div id="label-container" style="margin-top:20px; opacity:0.5;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/mcBb2quyl/";
        let model, webcam, labelContainer, maxPredictions;
        let timerInterval = null, totalSeconds = 0, isFocusing = false, ttsInterval = null;

        async function init() {
            document.querySelector("button").style.display = "none";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }
        async function loop() { webcam.update(); await predict(); window.requestAnimationFrame(loop); }
        
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestClass = ""; let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.childNodes[i].innerHTML = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                if (prediction[i].probability > highestProb) { highestProb = prediction[i].probability; highestClass = prediction[i].className; }
            }

            // 새롭게 정의된 4종 클래스 상수 설정
            const CLASS_FOCUS = "focus"; 
            const CLASS_HANDLED = "handled phone";
            const CLASS_TABLE = "phone set on the table";
            const CLASS_NONE = "NONE"; 

            // 확률 60% 이상 만족 시 세부 핸들러로 라우팅
            if (highestClass === CLASS_FOCUS && highestProb >= 0.6) {
                handleFocusStatus();
            } else if (highestClass === CLASS_HANDLED && highestProb >= 0.6) {
                handleHandledStatus();
            } else if (highestClass === CLASS_TABLE && highestProb >= 0.6) {
                handleTableStatus();
            } else if (highestClass === CLASS_NONE && highestProb >= 0.6) {
                handleIdleStatus();
            }
        }

        // 🟢 집중 상태 (focus)
        function handleFocusStatus() {
            const statusDiv = document.getElementById("webcam-status");
            statusDiv.innerText = "공부에 집중하시네요!";
            statusDiv.style.color = "#4ade80"; 

            if (!isFocusing) {
                isFocusing = true;
                document.body.className = "status-focus";
                stopWarningSpeech();
                if (!timerInterval) { timerInterval = setInterval(() => { totalSeconds++; updateTimerDisplay(); }, 1000); }
            }
        }
        
        // 🔴 딴짓 상태 1 (handled phone) - 직접 사용하는 상태
        function handleHandledStatus() {
            const statusDiv = document.getElementById("webcam-status");
            statusDiv.innerText = "스마트폰을 내려놓고 공부하세요!";
            statusDiv.style.color = "#f87171"; 

            triggerDistractionEffects();
        }

        // 🟠 딴짓 상태 2 (phone set on the table) - 책상 위에 방치된 상태
        function handleTableStatus() {
            const statusDiv = document.getElementById("webcam-status");
            statusDiv.innerText = "책상 위 스마트폰을 치워두세요!";
            statusDiv.style.color = "#fb923c"; // 주황빛 경고색

            triggerDistractionEffects();
        }
        
        // 딴짓 상태 공통 배경 변화 및 오디오 경보 제어 함수
        function triggerDistractionEffects() {
            if (isFocusing || timerInterval !== null || document.body.className !== "status-distracted") {
                isFocusing = false;
                document.body.className = "status-distracted";
                clearInterval(timerInterval); timerInterval = null;
                startWarningSpeech();
            }
        }
        
        // 🟡 대기 상태 (NONE)
        function handleIdleStatus() {
            const statusDiv = document.getElementById("webcam-status");
            statusDiv.innerText = "공부하는건 어떨까요?";
            statusDiv.style.color = "#f59e0b"; 

            isFocusing = false;
            document.body.className = ""; 
            clearInterval(timerInterval); timerInterval = null;
            stopWarningSpeech();
        }
        
        function updateTimerDisplay() {
            const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById("timer").innerText = `${hours}:${minutes}:${seconds}`;
        }
        function startWarningSpeech() { if (!ttsInterval) { playTTS(); ttsInterval = setInterval(playTTS, 3000); } }
        function stopWarningSpeech() { clearInterval(ttsInterval); ttsInterval = null; window.speechSynthesis.cancel(); }
        function playTTS() { window.speechSynthesis.cancel(); const speech = new SpeechSynthesisUtterance("공부하세요"); speech.lang = "ko-KR"; window.speechSynthesis.speak(speech); }
    </script>
</body>
</html>
